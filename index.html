<!DOCTYPE html>
<html lang="en" class="h-full">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>YourFriend - Universal AI</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <!-- Marked.js (Markdown) -->
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <!-- Prism.js (Code Highlighting) -->
    <link href="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/themes/prism-tomorrow.min.css" rel="stylesheet" />
    <script src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/prism.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/components/prism-javascript.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/components/prism-python.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/components/prism-css.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap');
        
        body {
            font-family: 'Inter', sans-serif;
            background-color: #131314;
            color: #e3e3e3;
        }

        .chat-container::-webkit-scrollbar {
            width: 6px;
        }
        .chat-container::-webkit-scrollbar-thumb {
            background-color: #303030;
            border-radius: 10px;
        }

        .sidebar-item:hover {
            background-color: #282a2c;
        }
        .sidebar-item.active {
            background-color: #333537;
        }

        .markdown-content pre {
            background: #1e1e1e !important;
            border-radius: 8px;
            padding: 1rem;
            margin: 1rem 0;
            overflow-x: auto;
        }
        .markdown-content code {
            font-family: 'Fira Code', monospace;
            font-size: 0.9em;
        }
        .markdown-content p {
            margin-bottom: 1rem;
            line-height: 1.6;
        }
        .markdown-content ul, .markdown-content ol {
            margin-left: 1.5rem;
            margin-bottom: 1rem;
        }

        .thinking-dot {
            animation: pulse 1.5s infinite ease-in-out;
        }
        @keyframes pulse {
            0%, 100% { opacity: 0.3; transform: scale(0.8); }
            50% { opacity: 1; transform: scale(1.1); }
        }

        /* Arena Mode Side-by-Side */
        .arena-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 1rem;
        }

        @media (max-width: 768px) {
            .arena-grid {
                grid-template-columns: 1fr;
            }
        }

        .glass-panel {
            background: rgba(30, 31, 32, 0.7);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .gemini-gradient {
            background: linear-gradient(90deg, #4285f4, #9b72cb, #d96570);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .model-pill {
            background: #282a2c;
            border: 1px solid #3c4043;
            transition: all 0.2s;
        }
        .model-pill.selected {
            border-color: #8ab4f8;
            background: rgba(138, 180, 248, 0.1);
        }
    </style>
</head>
<body class="flex h-screen overflow-hidden">

    <!-- Mobile Sidebar Toggle -->
    <button id="mobile-sidebar-toggle" class="fixed top-4 left-4 z-50 p-2 lg:hidden bg-zinc-800 rounded-lg text-white">
        <i data-lucide="menu"></i>
    </button>

    <!-- Sidebar -->
    <aside id="sidebar" class="fixed inset-y-0 left-0 z-40 w-72 bg-[#1e1f20] transform -translate-x-full lg:translate-x-0 transition-transform duration-300 ease-in-out flex flex-col">
        <div class="p-4 flex items-center justify-between">
            <h1 class="text-xl font-bold flex items-center gap-2">
                <span class="gemini-gradient">YourFriend</span>
            </h1>
            <button onclick="createNewChat()" class="p-2 hover:bg-zinc-800 rounded-full transition-colors" title="New Chat">
                <i data-lucide="plus-circle" class="w-5 h-5"></i>
            </button>
        </div>

        <div id="chat-history" class="flex-1 overflow-y-auto px-2 space-y-1 chat-container">
            <!-- Chat history items will be injected here -->
        </div>

        <div class="p-4 border-t border-zinc-800 space-y-2">
            <button onclick="toggleArenaMode()" id="arena-toggle-btn" class="w-full flex items-center gap-3 p-3 text-sm font-medium rounded-lg sidebar-item transition-all">
                <i data-lucide="swords" class="w-5 h-5 text-purple-400"></i>
                Arena Mode
            </button>
            <button onclick="openSettings()" class="w-full flex items-center gap-3 p-3 text-sm font-medium rounded-lg sidebar-item transition-all">
                <i data-lucide="settings" class="w-5 h-5"></i>
                Settings
            </button>
        </div>
    </aside>

    <!-- Main Content -->
    <main class="flex-1 flex flex-col h-full lg:ml-72 bg-[#131314] relative">
        
        <!-- Header / Model Selector -->
        <header class="h-16 flex items-center justify-between px-6 border-b border-zinc-800 bg-[#131314]/80 backdrop-blur-md sticky top-0 z-30">
            <div id="model-selector-container" class="flex gap-2">
                <select id="primary-model" class="bg-zinc-800 text-sm border-none rounded-lg px-3 py-1 focus:ring-1 focus:ring-blue-500 outline-none">
                    <option value="google/gemini-2.0-flash-001">Gemini 2.0 Flash</option>
                    <option value="openai/gpt-4o">GPT-4o</option>
                    <option value="anthropic/claude-3.5-sonnet">Claude 3.5 Sonnet</option>
                    <option value="meta-llama/llama-3.1-405b">Llama 3.1 405B</option>
                    <option value="custom">Custom Model...</option>
                </select>
                <div id="arena-secondary-container" class="hidden flex items-center gap-2">
                    <span class="text-zinc-500 font-bold">VS</span>
                    <select id="secondary-model" class="bg-zinc-800 text-sm border-none rounded-lg px-3 py-1 focus:ring-1 focus:ring-purple-500 outline-none">
                        <option value="openai/gpt-4o">GPT-4o</option>
                        <option value="google/gemini-2.0-flash-001">Gemini 2.0 Flash</option>
                        <option value="anthropic/claude-3.5-sonnet">Claude 3.5 Sonnet</option>
                        <option value="deepseek/deepseek-chat">DeepSeek V3</option>
                    </select>
                </div>
            </div>
            
            <div class="flex items-center gap-4">
                <div id="connection-status" class="flex items-center gap-2 text-xs text-green-500">
                    <span class="w-2 h-2 rounded-full bg-green-500"></span>
                    Ready
                </div>
            </div>
        </header>

        <!-- Chat Area -->
        <div id="chat-window" class="flex-1 overflow-y-auto chat-container p-4 md:p-8 space-y-8">
            <!-- Welcome View -->
            <div id="welcome-view" class="h-full flex flex-col items-center justify-center text-center max-w-2xl mx-auto space-y-6">
                <h2 class="text-4xl font-semibold tracking-tight">Hello, I'm <span class="gemini-gradient">YourFriend</span></h2>
                <p class="text-zinc-400 text-lg">Your universal AI assistant. How can I help you today?</p>
                <div class="grid grid-cols-1 md:grid-cols-2 gap-4 w-full">
                    <button onclick="setPrompt('Explain quantum computing like I\'m five')" class="p-4 bg-zinc-800/50 hover:bg-zinc-800 border border-zinc-700 rounded-xl text-left transition-all">
                        <p class="text-sm font-medium">Explain quantum computing...</p>
                    </button>
                    <button onclick="setPrompt('Write a Python script for a simple web scraper')" class="p-4 bg-zinc-800/50 hover:bg-zinc-800 border border-zinc-700 rounded-xl text-left transition-all">
                        <p class="text-sm font-medium">Write a Python script...</p>
                    </button>
                </div>
            </div>

            <!-- Messages go here -->
            <div id="messages-list" class="max-w-4xl mx-auto w-full space-y-8 pb-32"></div>
        </div>

        <!-- Input Area -->
        <div class="absolute bottom-0 left-0 right-0 p-4 md:p-6 bg-gradient-to-t from-[#131314] via-[#131314] to-transparent">
            <div class="max-w-4xl mx-auto relative group">
                <textarea 
                    id="chat-input"
                    rows="1"
                    placeholder="Ask YourFriend anything..."
                    class="w-full bg-[#1e1f20] text-white rounded-2xl py-4 pl-6 pr-14 resize-none border-none focus:ring-2 focus:ring-blue-500 transition-all outline-none shadow-xl"
                ></textarea>
                <button 
                    id="send-btn"
                    class="absolute right-3 bottom-3 p-2 bg-blue-600 hover:bg-blue-500 text-white rounded-xl transition-all disabled:opacity-50 disabled:cursor-not-allowed"
                >
                    <i data-lucide="send" class="w-5 h-5"></i>
                </button>
            </div>
            <p class="text-center text-[10px] text-zinc-500 mt-3">
                YourFriend can make mistakes. Consider checking important information.
            </p>
        </div>
    </main>

    <!-- Settings Modal -->
    <div id="settings-modal" class="fixed inset-0 z-50 hidden flex items-center justify-center bg-black/60 backdrop-blur-sm p-4">
        <div class="bg-zinc-900 border border-zinc-800 rounded-2xl w-full max-w-md overflow-hidden shadow-2xl">
            <div class="p-6 border-b border-zinc-800 flex justify-between items-center">
                <h3 class="text-xl font-bold">Settings</h3>
                <button onclick="closeSettings()" class="text-zinc-400 hover:text-white">
                    <i data-lucide="x" class="w-6 h-6"></i>
                </button>
            </div>
            <div class="p-6 space-y-6">
                <div class="space-y-2">
                    <label class="text-sm font-medium text-zinc-300">OpenRouter API Key</label>
                    <div class="relative">
                        <input type="password" id="api-key-input" placeholder="sk-or-v1-..." class="w-full bg-zinc-800 border border-zinc-700 rounded-lg px-4 py-2 focus:ring-2 focus:ring-blue-500 outline-none">
                    </div>
                    <p class="text-xs text-zinc-500">Get your key from <a href="https://openrouter.ai/keys" target="_blank" class="text-blue-400 hover:underline">openrouter.ai</a></p>
                </div>
                
                <div class="space-y-2">
                    <label class="text-sm font-medium text-zinc-300">Custom Model Name</label>
                    <input type="text" id="custom-model-input" placeholder="e.g. meta-llama/llama-3.1-70b-instruct" class="w-full bg-zinc-800 border border-zinc-700 rounded-lg px-4 py-2 focus:ring-2 focus:ring-blue-500 outline-none">
                </div>

                <div class="flex items-center justify-between p-3 bg-zinc-800/50 rounded-lg">
                    <span class="text-sm">Dark Mode</span>
                    <div class="w-10 h-5 bg-blue-600 rounded-full flex items-center px-1">
                        <div class="w-3 h-3 bg-white rounded-full ml-auto"></div>
                    </div>
                </div>
            </div>
            <div class="p-6 bg-zinc-800/30 flex justify-end gap-3">
                <button onclick="closeSettings()" class="px-4 py-2 text-sm font-medium hover:bg-zinc-800 rounded-lg transition-colors">Cancel</button>
                <button onclick="saveSettings()" class="px-4 py-2 text-sm font-medium bg-blue-600 hover:bg-blue-500 text-white rounded-lg transition-colors">Save Changes</button>
            </div>
        </div>
    </div>

    <!-- JavaScript Logic -->
    <script>
        // --- State Management ---
        let chats = JSON.parse(localStorage.getItem('yourfriend_chats') || '[]');
        let activeChatId = null;
        let config = JSON.parse(localStorage.getItem('yourfriend_config') || '{"apiKey": "", "customModel": "", "arenaMode": false}');
        
        const elements = {
            chatWindow: document.getElementById('chat-window'),
            messagesList: document.getElementById('messages-list'),
            chatInput: document.getElementById('chat-input'),
            sendBtn: document.getElementById('send-btn'),
            historyList: document.getElementById('chat-history'),
            settingsModal: document.getElementById('settings-modal'),
            apiKeyInput: document.getElementById('api-key-input'),
            customModelInput: document.getElementById('custom-model-input'),
            primaryModel: document.getElementById('primary-model'),
            secondaryModel: document.getElementById('secondary-model'),
            arenaContainer: document.getElementById('arena-secondary-container'),
            arenaToggleBtn: document.getElementById('arena-toggle-btn'),
            welcomeView: document.getElementById('welcome-view'),
            mobileToggle: document.getElementById('mobile-sidebar-toggle'),
            sidebar: document.getElementById('sidebar')
        };

        // Initialize Lucide icons
        lucide.createIcons();

        // --- Initialization ---
        function init() {
            renderHistory();
            if (config.apiKey) {
                elements.apiKeyInput.value = config.apiKey;
            }
            if (config.customModel) {
                elements.customModelInput.value = config.customModel;
            }
            
            updateArenaUI();
            
            // Textarea auto-resize
            elements.chatInput.addEventListener('input', function() {
                this.style.height = 'auto';
                this.style.height = (this.scrollHeight) + 'px';
            });

            // Enter to send (Shift+Enter for newline)
            elements.chatInput.addEventListener('keydown', (e) => {
                if (e.key === 'Enter' && !e.shiftKey) {
                    e.preventDefault();
                    sendMessage();
                }
            });

            elements.sendBtn.addEventListener('click', sendMessage);

            // Mobile menu toggle
            elements.mobileToggle.addEventListener('click', () => {
                elements.sidebar.classList.toggle('-translate-x-full');
            });
        }

        // --- Arena Mode Logic ---
        function toggleArenaMode() {
            config.arenaMode = !config.arenaMode;
            saveConfig();
            updateArenaUI();
        }

        function updateArenaUI() {
            if (config.arenaMode) {
                elements.arenaContainer.classList.remove('hidden');
                elements.arenaToggleBtn.classList.add('bg-purple-900/30', 'border', 'border-purple-500/30');
            } else {
                elements.arenaContainer.classList.add('hidden');
                elements.arenaToggleBtn.classList.remove('bg-purple-900/30', 'border', 'border-purple-500/30');
            }
        }

        // --- Settings Logic ---
        function openSettings() { elements.settingsModal.classList.remove('hidden'); }
        function closeSettings() { elements.settingsModal.classList.add('hidden'); }

        function saveSettings() {
            config.apiKey = elements.apiKeyInput.value.trim();
            config.customModel = elements.customModelInput.value.trim();
            saveConfig();
            closeSettings();
            alert('Settings saved!');
        }

        function saveConfig() {
            localStorage.setItem('yourfriend_config', JSON.stringify(config));
        }

        // --- Chat Logic ---
        async function sendMessage() {
            const content = elements.chatInput.value.trim();
            if (!content) return;
            if (!config.apiKey) {
                alert("Please add your OpenRouter API Key in Settings first!");
                openSettings();
                return;
            }

            // Create new chat if none active
            if (!activeChatId) {
                activeChatId = Date.now().toString();
                chats.unshift({
                    id: activeChatId,
                    title: content.substring(0, 30) + (content.length > 30 ? '...' : ''),
                    messages: []
                });
            }

            const currentChat = chats.find(c => c.id === activeChatId);
            
            // Add user message
            const userMsg = { role: 'user', content };
            currentChat.messages.push(userMsg);
            
            elements.chatInput.value = '';
            elements.chatInput.style.height = 'auto';
            elements.welcomeView.classList.add('hidden');
            
            renderMessages();
            renderHistory();
            saveChats();

            // Prepare for AI response
            const primaryModel = elements.primaryModel.value === 'custom' ? config.customModel : elements.primaryModel.value;
            const secondaryModel = elements.secondaryModel.value;

            if (config.arenaMode) {
                // Arena Mode: Request both models
                const arenaId = 'arena-' + Date.now();
                appendArenaPlaceholder(arenaId);
                
                Promise.all([
                    requestAIResponse(primaryModel, currentChat.messages.slice(0, -1), content, arenaId, 'left'),
                    requestAIResponse(secondaryModel, currentChat.messages.slice(0, -1), content, arenaId, 'right')
                ]).then(([res1, res2]) => {
                    currentChat.messages.push({ 
                        role: 'assistant_arena', 
                        primary: res1, 
                        secondary: res2,
                        models: [primaryModel, secondaryModel]
                    });
                    saveChats();
                    renderMessages();
                });

            } else {
                // Single Mode
                const placeholderId = 'ai-typing-' + Date.now();
                appendMessage('assistant', '', primaryModel, placeholderId);
                
                const response = await requestAIResponse(primaryModel, currentChat.messages.slice(0, -1), content, placeholderId);
                currentChat.messages.push({ role: 'assistant', content: response, model: primaryModel });
                saveChats();
                renderMessages();
            }
        }

        async function requestAIResponse(model, history, currentPrompt, elementId, arenaSide = null) {
            const targetEl = document.getElementById(elementId + (arenaSide ? `-${arenaSide}` : ''));
            const container = targetEl?.querySelector('.markdown-content') || targetEl;
            
            try {
                // Simulate "Thinking"
                if(container) container.innerHTML = '<div class="flex gap-1 items-center text-zinc-500 text-sm"><span class="thinking-dot">●</span><span class="thinking-dot" style="animation-delay: 0.2s">●</span><span class="thinking-dot" style="animation-delay: 0.4s">●</span> Thinking...</div>';

                const response = await fetch("https://openrouter.ai/api/v1/chat/completions", {
                    method: "POST",
                    headers: {
                        "Authorization": `Bearer ${config.apiKey}`,
                        "HTTP-Referer": window.location.href,
                        "X-Title": "YourFriend AI",
                        "Content-Type": "application/json"
                    },
                    body: JSON.stringify({
                        "model": model,
                        "messages": [...history, { role: "user", content: currentPrompt }]
                    })
                });

                const data = await response.json();
                const text = data.choices[0].message.content;

                // Simple thinking parser if model includes <thought>
                const cleanText = text.replace(/<thought>[\s\S]*?<\/thought>/g, '');
                
                return cleanText;
            } catch (err) {
                console.error(err);
                return "Error: Could not connect to API. Please check your key and model name.";
            }
        }

        function setPrompt(text) {
            elements.chatInput.value = text;
            elements.chatInput.focus();
            elements.chatInput.style.height = (elements.chatInput.scrollHeight) + 'px';
        }

        // --- Rendering Logic ---
        function renderMessages() {
            const currentChat = chats.find(c => c.id === activeChatId);
            if (!currentChat) {
                elements.welcomeView.classList.remove('hidden');
                elements.messagesList.innerHTML = '';
                return;
            }

            elements.welcomeView.classList.add('hidden');
            elements.messagesList.innerHTML = '';
            
            currentChat.messages.forEach((msg, idx) => {
                if (msg.role === 'assistant_arena') {
                    renderArenaMessage(msg);
                } else {
                    appendMessage(msg.role, msg.content, msg.model);
                }
            });
            
            elements.chatWindow.scrollTo({ top: elements.chatWindow.scrollHeight, behavior: 'smooth' });
            Prism.highlightAll();
        }

        function appendMessage(role, content, model = '', id = null) {
            const isUser = role === 'user';
            const msgDiv = document.createElement('div');
            msgDiv.className = `flex ${isUser ? 'justify-end' : 'justify-start'} animate-in fade-in slide-in-from-bottom-2`;
            if (id) msgDiv.id = id;

            const innerHtml = `
                <div class="max-w-[85%] flex gap-4 ${isUser ? 'flex-row-reverse' : 'flex-row'}">
                    <div class="w-8 h-8 rounded-full flex-shrink-0 flex items-center justify-center ${isUser ? 'bg-zinc-700' : 'bg-blue-600'}">
                        <i data-lucide="${isUser ? 'user' : 'bot'}" class="w-5 h-5 text-white"></i>
                    </div>
                    <div class="space-y-2">
                        ${!isUser && model ? `<div class="text-[10px] uppercase tracking-widest text-zinc-500 font-bold">${model.split('/').pop()}</div>` : ''}
                        <div class="markdown-content ${isUser ? 'bg-zinc-800 p-4 rounded-2xl rounded-tr-none' : 'text-zinc-200'}">
                            ${isUser ? content : marked.parse(content || '')}
                        </div>
                    </div>
                </div>
            `;
            
            msgDiv.innerHTML = innerHtml;
            elements.messagesList.appendChild(msgDiv);
            lucide.createIcons();
        }

        function appendArenaPlaceholder(id) {
            const msgDiv = document.createElement('div');
            msgDiv.id = id;
            msgDiv.className = "arena-grid w-full";
            msgDiv.innerHTML = `
                <div id="${id}-left" class="bg-zinc-900/50 border border-zinc-800 p-4 rounded-xl min-h-[100px] markdown-content"></div>
                <div id="${id}-right" class="bg-zinc-900/50 border border-zinc-800 p-4 rounded-xl min-h-[100px] markdown-content"></div>
            `;
            elements.messagesList.appendChild(msgDiv);
        }

        function renderArenaMessage(msg) {
            const msgDiv = document.createElement('div');
            msgDiv.className = "arena-grid w-full gap-4";
            msgDiv.innerHTML = `
                <div class="bg-zinc-900/50 border border-zinc-800 p-4 rounded-xl">
                    <div class="text-[10px] uppercase tracking-widest text-zinc-500 font-bold mb-2">${msg.models[0].split('/').pop()}</div>
                    <div class="markdown-content text-sm text-zinc-300">${marked.parse(msg.primary)}</div>
                </div>
                <div class="bg-zinc-900/50 border border-zinc-800 p-4 rounded-xl">
                    <div class="text-[10px] uppercase tracking-widest text-zinc-500 font-bold mb-2">${msg.models[1].split('/').pop()}</div>
                    <div class="markdown-content text-sm text-zinc-300">${marked.parse(msg.secondary)}</div>
                </div>
            `;
            elements.messagesList.appendChild(msgDiv);
        }

        function renderHistory() {
            elements.historyList.innerHTML = '';
            chats.forEach(chat => {
                const btn = document.createElement('button');
                btn.className = `w-full text-left p-3 rounded-lg flex items-center gap-3 sidebar-item transition-all truncate text-sm ${activeChatId === chat.id ? 'active' : ''}`;
                btn.onclick = () => loadChat(chat.id);
                btn.innerHTML = `
                    <i data-lucide="message-square" class="w-4 h-4 flex-shrink-0 text-zinc-400"></i>
                    <span class="truncate">${chat.title}</span>
                `;
                elements.historyList.appendChild(btn);
            });
            lucide.createIcons();
        }

        function createNewChat() {
            activeChatId = null;
            elements.messagesList.innerHTML = '';
            elements.welcomeView.classList.remove('hidden');
            renderHistory();
            if(window.innerWidth < 1024) elements.sidebar.classList.add('-translate-x-full');
        }

        function loadChat(id) {
            activeChatId = id;
            renderMessages();
            renderHistory();
            if(window.innerWidth < 1024) elements.sidebar.classList.add('-translate-x-full');
        }

        function saveChats() {
            localStorage.setItem('yourfriend_chats', JSON.stringify(chats));
        }

        // --- Run App ---
        init();

    </script>
</body>
                  </html>
